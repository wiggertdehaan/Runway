services:
  # ── Gateway (Traefik) ──────────────────────────────────
  # Reverse proxy with automatic HTTPS via Let's Encrypt.
  #
  # Uses the file provider (not the docker provider): the control
  # plane writes Traefik dynamic config files into the shared
  # gateway-config volume — one for the dashboard itself and one
  # per deployed app — and Traefik picks them up. This means
  # Traefik needs no access to the Docker daemon at all, and
  # proxies HTTP to named services resolved through the internal
  # Docker DNS (e.g. http://control:3000).
  #
  # Joins two networks: `runway-internal` so it can reach the
  # control plane (for the dashboard and forward-auth), and
  # `runway-apps` so it can route to deployed app containers.
  #
  # The dashboard/insecure API is intentionally disabled.
  gateway:
    image: traefik:v3.5
    container_name: runway-gateway
    restart: unless-stopped
    environment:
      - DASHBOARD_DOMAIN=${DASHBOARD_DOMAIN:?DASHBOARD_DOMAIN must be set in .env}
    command:
      - "--providers.file.directory=/config"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL must be set in .env}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - gateway-config:/config
      - gateway-data:/data
    networks:
      - runway-internal
      - runway-apps

  # ── Builder (BuildKit) ─────────────────────────────────
  # Isolated image builder. Control reaches buildkit via the Docker
  # socket (`docker exec`), not over TCP, so buildkit does NOT share
  # a network with control or with deployed apps. This prevents
  # malicious RUN steps in a user Dockerfile from reaching the
  # control plane or other apps at build time.
  buildkit:
    image: moby/buildkit:latest
    container_name: runway-buildkit
    restart: unless-stopped
    privileged: true
    command:
      - "--addr"
      - "unix:///run/buildkit/buildkitd.sock"
    volumes:
      - buildkit-cache:/var/lib/buildkit
      - build-exchange:/exchange
    networks:
      - runway-build

  # ── Control Plane ──────────────────────────────────────
  # Web dashboard + REST API backing the MCP server.
  #
  # Lives on `runway-internal` only. Deployed app containers live
  # on `runway-apps` and therefore cannot reach `control:3000`
  # directly. Gateway straddles both networks to route traffic.
  control:
    build:
      context: .
      dockerfile: packages/control/Dockerfile
    container_name: runway-control
    restart: unless-stopped
    depends_on:
      - gateway
      - buildkit
    volumes:
      - control-data:/data
      - gateway-config:/gateway-config
      # Docker socket is needed for the deploy pipeline: control builds
      # app images and runs containers via the Docker API. This is a
      # deliberate MVP tradeoff — a compromise of control effectively
      # means root on the host. Moving to an isolated builder container
      # is tracked in the roadmap.
      - /var/run/docker.sock:/var/run/docker.sock
      - build-exchange:/exchange
      # Persist Trivy's vulnerability DB (~500 MB) across restarts so
      # only the first scan pays the download cost.
      - trivy-cache:/root/.cache/trivy
    environment:
      - DB_PATH=/data/runway.db
      - PORT=3000
      - GATEWAY_CONFIG_DIR=/gateway-config
      - RUNWAY_NETWORK=runway-apps
      - BUILDKIT_CONTAINER=runway-buildkit
      - DASHBOARD_DOMAIN=${DASHBOARD_DOMAIN:?DASHBOARD_DOMAIN must be set in .env}
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:nosuid
    networks:
      - runway-internal

volumes:
  control-data:
  gateway-data:
  gateway-config:
  buildkit-cache:
  build-exchange:
  trivy-cache:

networks:
  # Control plane ↔ gateway. Not reachable by deployed apps or by
  # build sandboxes.
  runway-internal:
    name: runway-internal
  # Deployed app containers ↔ gateway. No control-plane reachability.
  runway-apps:
    name: runway-apps
  # BuildKit only. Isolated so build-time RUN steps cannot reach
  # control, gateway, or other apps over the internal Docker DNS.
  runway-build:
    name: runway-build
