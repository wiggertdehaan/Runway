# Dependabot is still read from the default branch (main), but every
# PR it opens must target `develop` so our GitFlow stays clean —
# upgrades flow develop → main via the normal release PR path.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps

  - package-ecosystem: npm
    directory: /packages/control
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps

  - package-ecosystem: npm
    directory: /packages/mcp
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
